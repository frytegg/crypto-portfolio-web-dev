# Blueprint Render pour l'API (Fastify).
# Variables avec sync: false à renseigner manuellement dans le dashboard Render
# (MONGODB_URI, JWT_SECRET, CORS_ORIGIN, APP_BASE_URL, SMTP_USER/PASS/HOST).
services:
  - type: web
    name: crypto-portfolio-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_COOKIE_NAME
        value: token
      - key: CORS_ORIGIN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: MAIL_FROM
        value: no-reply@crypto-portfolio.local
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: 'false'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
